<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Happy Birthday ❤️</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
      }
    }
  </script>

  <style>
    :root {
      --bg1: #ffd8eb;
      --bg2: #c7a6ff;
      --bg3: #6f4fa8;
      --text: #fff7fd;
      --pink: #ff8ec3;
      --gold: #f5d67b;
      --shadow: 0 20px 70px rgba(31, 12, 46, 0.28);
      --letter-text: #2C2C2C;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,255,255,0.22), transparent 20%),
        radial-gradient(circle at 85% 20%, rgba(255,192,228,0.22), transparent 18%),
        radial-gradient(circle at 50% 85%, rgba(255,255,255,0.08), transparent 26%),
        linear-gradient(145deg, var(--bg1) 0%, #e5b7ff 32%, #a36cf0 62%, var(--bg3) 100%);
      scroll-behavior: smooth;
    }

    body.revealed {
      overflow-y: auto;
    }

    #scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      width: 100%;
    }

    .soft-glow {
      box-shadow:
        0 0 24px rgba(255, 184, 214, 0.28),
        0 0 80px rgba(255, 204, 228, 0.08);
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255,255,255,0.36);
      box-shadow: var(--shadow);
      backdrop-filter: blur(15px) saturate(130%);
      -webkit-backdrop-filter: blur(15px) saturate(130%);
    }

    .hero-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      position: relative;
    }

    .hero-panel {
      width: min(94vw, 560px);
      border-radius: 30px;
      padding: 22px 20px 26px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .headline {
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0;
      text-shadow: 0 8px 34px rgba(255, 255, 255, 0.18);
    }

    .sub {
      margin-top: 12px;
      color: rgba(255,255,255,0.86);
      font-size: clamp(0.98rem, 2.8vw, 1.08rem);
      line-height: 1.6;
    }

    .gift-zone {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 28px;
      min-height: 260px;
      perspective: 1200px;
    }

    .gift-box {
      position: relative;
      width: 154px;
      height: 154px;
      transform-style: preserve-3d;
      cursor: pointer;
      filter: drop-shadow(0 28px 48px rgba(0,0,0,0.18));
      will-change: transform;
    }

    .box-base {
      position: absolute;
      bottom: 0;
      width: 154px;
      height: 118px;
      border-radius: 18px;
      background:
        linear-gradient(135deg, #ffb7dc, #ff84bf 50%, #f86cb0 100%);
      box-shadow:
        inset -10px -12px 25px rgba(255,255,255,0.16),
        inset 10px 12px 26px rgba(120, 18, 78, 0.14);
      overflow: hidden;
    }

    .box-lid {
      position: absolute;
      top: 8px;
      left: -4px;
      width: 162px;
      height: 44px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, #ffd7ea, #ff96c9 48%, #ff79bc 100%);
      box-shadow:
        inset -8px -8px 14px rgba(255,255,255,0.2),
        inset 8px 8px 18px rgba(137, 26, 88, 0.12);
      transform-origin: center bottom;
      z-index: 4;
    }

    .ribbon-v,
    .ribbon-h {
      position: absolute;
      background: linear-gradient(180deg, #ffeaa0, #f1c85c, #d8ab38);
      box-shadow: inset 0 0 8px rgba(255,255,255,0.18);
      z-index: 5;
    }

    .ribbon-v {
      width: 26px;
      height: 154px;
      left: 64px;
      top: 0;
      border-radius: 14px;
    }

    .ribbon-h {
      width: 154px;
      height: 20px;
      left: 0;
      top: 24px;
      border-radius: 12px;
    }

    .bow {
      position: absolute;
      top: -8px;
      left: 47px;
      width: 60px;
      height: 34px;
      z-index: 6;
    }

    .bow::before,
    .bow::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 26px;
      border-radius: 50% 50% 50% 10%;
      background: linear-gradient(145deg, #ffe89c, #f3cb5d, #dca936);
      top: 2px;
    }

    .bow::before {
      left: 3px;
      transform: rotate(-28deg);
    }

    .bow::after {
      right: 3px;
      transform: scaleX(-1) rotate(-28deg);
    }

    .bow-center {
      position: absolute;
      left: 25px;
      top: 10px;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #f6d56f;
      box-shadow: 0 0 16px rgba(255, 232, 160, 0.5);
    }

    .gift-label {
      margin-top: 18px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.02em;
    }

    .music-toggle {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      right: 14px;
      z-index: 12;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 12px 40px rgba(15, 8, 23, 0.22);
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .music-toggle:active {
      transform: scale(0.96);
    }

    .music-toggle.playing {
      background: rgba(255,255,255,0.24);
    }

    .float-bubble {
      position: fixed;
      z-index: 4;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(50, 12, 67, 0.16);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.9);
      font-size: 0.76rem;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .bubble-word {
      position: fixed;
      z-index: 8;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      color: white;
      font-size: 0.86rem;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
    }

    .letter-section {
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
      padding: 0 16px calc(90px + env(safe-area-inset-bottom));
      position: relative;
      z-index: 5;
    }

    .letter-card {
      width: min(94vw, 860px);
      margin: 0 auto;
      border-radius: 30px;
      padding: 18px;
    }

    .letter-inner {
      border-radius: 24px;
      padding: 24px 18px 34px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.24);
    }

    .letter-title {
      font-size: clamp(1.6rem, 4vw, 2.15rem);
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      color: var(--letter-text);
      font-family: "Dancing Script", cursive;
      text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    .letter-paragraph {
      opacity: 0;
      transform: translateY(24px);
      transition: all 1s ease;
      line-height: 1.8;
      font-size: clamp(1.02rem, 2.9vw, 1.14rem);
      color: var(--letter-text);
      margin: 0 0 24px;
      white-space: pre-wrap;
      text-align: center;
      font-family: "Playfair Display", serif;
      text-shadow:
        0 0 1px rgba(255,255,255,0.65),
        0 0 10px rgba(255,255,255,0.32);
    }

    .letter-paragraph.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .letter-paragraph.last-paragraph {
      margin-bottom: 40px;
      padding-bottom: 10px;
      font-family: "Dancing Script", cursive;
      font-size: clamp(1.45rem, 4vw, 2rem);
      line-height: 1.7;
    }

    .scroll-shell {
      position: relative;
      margin: 0 auto 20px;
      width: min(84vw, 440px);
      opacity: 0;
      transform: translateY(40px) scale(0.96);
    }

    .scroll-paper {
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,245,251,0.74));
      color: #6b3956;
      padding: 18px 18px;
      box-shadow:
        0 22px 50px rgba(18, 8, 24, 0.18),
        inset 0 0 20px rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.45);
      text-align: center;
      font-weight: 600;
      font-family: "Playfair Display", serif;
    }

    .scroll-rod {
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fbe7a0, #d3a443);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
    }

    .photo-frame-wrap {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      perspective: 900px;
    }

    .photo-frame {
      width: min(76vw, 260px);
      padding: 10px;
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(255,229,160,0.85), rgba(240,185,91,0.78));
      box-shadow:
        0 18px 44px rgba(17,8,28,0.22),
        inset 0 0 14px rgba(255,255,255,0.34);
      transform-style: preserve-3d;
      animation: floatFrame 4.5s ease-in-out infinite;
    }

    .photo-frame img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 16px;
      border: 4px solid rgba(255,255,255,0.72);
    }

    .photo-caption {
      margin-top: 12px;
      text-align: center;
      font-size: 0.92rem;
      color: rgba(44, 44, 44, 0.9);
      font-family: "Playfair Display", serif;
    }

    .typewriter-cursor::after {
      content: "|";
      display: inline-block;
      margin-left: 2px;
      animation: blink 0.8s infinite;
      color: var(--letter-text);
    }

    .confetti-layer {
      position: fixed;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 18px;
      border-radius: 4px;
      opacity: 0.95;
      will-change: transform, opacity;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes floatFrame {
      0%, 100% { transform: rotateY(-6deg) translateY(0px); }
      50% { transform: rotateY(6deg) translateY(-10px); }
    }

    @media (max-width: 640px) {
      .hero-panel {
        padding: 22px 16px 24px;
        border-radius: 24px;
      }

      .gift-box {
        transform: scale(0.92);
      }

      .letter-card {
        padding: 14px;
        border-radius: 22px;
      }

      .letter-inner {
        padding: 22px 14px 42px;
        border-radius: 18px;
      }

      .letter-section {
        padding-bottom: calc(120px + env(safe-area-inset-bottom));
      }

      .letter-paragraph.last-paragraph {
        margin-bottom: 46px;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <button id="musicToggle" class="music-toggle" aria-label="Toggle music" title="Toggle music">
    <svg id="musicIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 3v10.55A4 4 0 1 0 14 17V8h4V3h-6z"/>
    </svg>
  </button>

  <div id="bubbleWord" class="bubble-word"></div>
  <div id="confettiLayer" class="confetti-layer"></div>

  <main class="overlay">
    <section class="hero-wrap">
      <div class="hero-panel soft-glow">
        <h1 class="headline">Happy Birthday Dearest💘</h1>
        <p class="sub">
          There’s something waiting for you.<br />
          Tap the gift and let it open slowly ❤️
        </p>

        <div class="gift-zone">
          <div id="giftBox" class="gift-box" role="button" aria-label="Open gift" tabindex="0">
            <div id="boxLid" class="box-lid"></div>
            <div class="box-base"></div>
            <div class="ribbon-v"></div>
            <div class="ribbon-h"></div>
            <div class="bow">
              <div class="bow-center"></div>
            </div>
          </div>
        </div>

        <div class="gift-label">Tap to open your letter ✨</div>
      </div>
    </section>

    <div id="scrollShell" class="scroll-shell">
      <div class="scroll-rod"></div>
      <div class="scroll-paper">
        A letter for you, from my heart 🤍
      </div>
      <div class="scroll-rod"></div>
    </div>

    <section id="letterSection" class="letter-section">
      <div class="letter-card glass">
        <div class="letter-inner">
          <div class="letter-title">For You 🫶🏼</div>
          <div id="paragraphs"></div>

          <div class="photo-frame-wrap">
            <div class="photo-frame">
              <img src="./photo.jpg" alt="A special you" />
            </div>
          </div>
          <div class="photo-caption">I stole this 😅</div>
        </div>
      </div>
    </section>
  </main>

  <audio id="bgMusic" loop preload="auto">
    <source src="./music.mp3" type="audio/mpeg" />
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <script type="module">
    import * as THREE from "three";

    const sceneCanvas = document.getElementById("scene");
    const giftBox = document.getElementById("giftBox");
    const boxLid = document.getElementById("boxLid");
    const letterSection = document.getElementById("letterSection");
    const scrollShell = document.getElementById("scrollShell");
    const paragraphsWrap = document.getElementById("paragraphs");
    const confettiLayer = document.getElementById("confettiLayer");
    const bubbleWord = document.getElementById("bubbleWord");
    const musicToggle = document.getElementById("musicToggle");
    const bgMusic = document.getElementById("bgMusic");

    const messageParagraphs = [
`I don’t know exactly when it started becoming this meaningful… but somewhere between all our conversations, your thoughts, your honesty, and the way you let me see the real you, you became very important to me.`,

`What I feel for you was never something random or temporary. It came from the connection I felt with you — the way we talk, the emotional intelligence you carry, and the genuineness you show in the smallest things.`,

`That is what made me admire you.
That is what made me feel close to you.
And that is what made me love you.`,

`I just want to be the one who stays till the end, I meant it in every way.`,

`And when you told me that you feel something real between us, that you trust me, that you value what we have, and that you want us to last… that stayed with me deeply.`,

`Because what we have does feel real.
Not rushed, not forced, not temporary.
Just something calm, honest, and meaningful — something that slowly grows with trust, care, and understanding.`,

`I know both of us feel the value of this bond.
And maybe that’s what makes it so special.`,

`So on your birthday, more than anything else, I just want you to feel happy, peaceful, and loved.
No pressure, no overthinking — just a beautiful day for the beautiful person you are 🌝`,

`Thank you for being you.
Thank you for trusting me.
And thank you for letting this bond become something so special to me.`,

`I’ll be here — not just for today, but for all the little moments, the difficult days, the laughter, the silence, and everything in between. 🙂`,

`Have the most beautiful birthday, Nehoos❤️`
    ];

    let opened = false;

    const renderer = new THREE.WebGLRenderer({
      canvas: sceneCanvas,
      antialias: true,
      alpha: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      42,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 12);

    scene.add(new THREE.AmbientLight(0xffffff, 1.4));

    const dirLight = new THREE.DirectionalLight(0xfff2ff, 2.2);
    dirLight.position.set(3, 5, 6);
    scene.add(dirLight);

    const pinkLight = new THREE.PointLight(0xff8ec3, 28, 30, 2);
    pinkLight.position.set(-4, 1, 5);
    scene.add(pinkLight);

    const goldLight = new THREE.PointLight(0xf7d97a, 22, 30, 2);
    goldLight.position.set(4, -1, 4);
    scene.add(goldLight);

    const world = new THREE.Group();
    scene.add(world);

    const shinyMat = (color, metalness = 0.4, roughness = 0.2) =>
      new THREE.MeshPhysicalMaterial({
        color,
        metalness,
        roughness,
        clearcoat: 1,
        clearcoatRoughness: 0.08,
        reflectivity: 0.95
      });

    const balloons = [];
    const balloonGroup = new THREE.Group();
    scene.add(balloonGroup);

    function createBalloon(color) {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.6, 32, 32),
        shinyMat(color, 0.45, 0.16)
      );
      body.scale.set(0.9, 1.18, 0.9);
      group.add(body);

      const knot = new THREE.Mesh(
        new THREE.ConeGeometry(0.07, 0.16, 14),
        shinyMat(color, 0.35, 0.22)
      );
      knot.position.y = -0.72;
      knot.rotation.x = Math.PI;
      group.add(knot);

      const points = [
        new THREE.Vector3(0, -0.76, 0),
        new THREE.Vector3(0.03, -1.1, 0.02),
        new THREE.Vector3(-0.04, -1.45, -0.01),
        new THREE.Vector3(0.02, -1.95, 0.03),
      ];
      const curve = new THREE.CatmullRomCurve3(points);
      const tube = new THREE.Mesh(
        new THREE.TubeGeometry(curve, 24, 0.01, 8, false),
        new THREE.MeshStandardMaterial({ color: 0xf8d8ef, roughness: 0.85 })
      );
      group.add(tube);

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.33 })
      );
      glow.position.set(0.18, 0.18, 0.48);
      glow.scale.set(1, 1.2, 0.5);
      group.add(glow);

      return group;
    }

    const balloonColors = [0xff8ec3, 0xffbfdc, 0xf3d57a, 0xe0b2ff, 0xf7a5d1, 0xf7dca0];
    const positions = [
      [-4.8, 2.2, -0.8],
      [-3.2, -0.2, -1.4],
      [-1.6, 2.9, -0.3],
      [1.8, 2.4, -0.9],
      [3.5, 0.2, -1.2],
      [4.9, 2.8, -1.8]
    ];

    positions.forEach((p, i) => {
      const b = createBalloon(balloonColors[i % balloonColors.length]);
      b.position.set(...p);
      b.userData = {
        baseX: p[0],
        baseY: p[1],
        phase: Math.random() * Math.PI * 2,
        drift: 0.6 + Math.random() * 0.6
      };
      balloonGroup.add(b);
      balloons.push(b);
    });

    const heartGroup = new THREE.Group();
    world.add(heartGroup);

    function heartShape() {
      const shape = new THREE.Shape();
      shape.moveTo(0, 0.25);
      shape.bezierCurveTo(0, 0.55, -0.45, 0.75, -0.65, 0.4);
      shape.bezierCurveTo(-0.85, 0.05, -0.45, -0.25, 0, -0.55);
      shape.bezierCurveTo(0.45, -0.25, 0.85, 0.05, 0.65, 0.4);
      shape.bezierCurveTo(0.45, 0.75, 0, 0.55, 0, 0.25);
      return shape;
    }

    const hearts = [];
    for (let i = 0; i < 24; i++) {
      const geo = new THREE.ExtrudeGeometry(heartShape(), {
        depth: 0.08,
        bevelEnabled: true,
        bevelSegments: 2,
        steps: 1,
        bevelSize: 0.04,
        bevelThickness: 0.03
      });
      const mat = shinyMat(i % 3 === 0 ? 0xff8fc8 : i % 3 === 1 ? 0xf9df80 : 0xf6b8e8, 0.28, 0.2);
      const mesh = new THREE.Mesh(geo, mat);
      mesh.scale.setScalar(0.28 + Math.random() * 0.18);
      mesh.position.set(
        (Math.random() - 0.5) * 12,
        (Math.random() - 0.5) * 8,
        -2 - Math.random() * 4
      );
      mesh.userData = {
        baseY: mesh.position.y,
        baseX: mesh.position.x,
        phase: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 0.6
      };
      heartGroup.add(mesh);
      hearts.push(mesh);
    }

    const starGroup = new THREE.Group();
    world.add(starGroup);

    const stars = [];
    for (let i = 0; i < 140; i++) {
      const star = new THREE.Mesh(
        new THREE.SphereGeometry(0.03, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.75 })
      );
      star.position.set(
        (Math.random() - 0.5) * 18,
        (Math.random() - 0.5) * 10,
        -4 - Math.random() * 8
      );
      star.userData = {
        baseY: star.position.y,
        phase: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.8
      };
      starGroup.add(star);
      stars.push(star);
    }

    const pointer = { x: 0, y: 0 };
    const targetPointer = { x: 0, y: 0 };

    function setPointer(x, y) {
      targetPointer.x = (x / window.innerWidth) * 2 - 1;
      targetPointer.y = -(y / window.innerHeight) * 2 + 1;
    }

    window.addEventListener("mousemove", (e) => setPointer(e.clientX, e.clientY), { passive: true });
    window.addEventListener("touchmove", (e) => {
      if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    const clock = new THREE.Clock();

    function animateScene() {
      requestAnimationFrame(animateScene);
      const t = clock.getElapsedTime();

      pointer.x += (targetPointer.x - pointer.x) * 0.05;
      pointer.y += (targetPointer.y - pointer.y) * 0.05;

      world.rotation.y = pointer.x * 0.15;
      world.rotation.x = pointer.y * 0.06;
      world.position.x = pointer.x * 0.35;
      world.position.y = pointer.y * 0.22;

      balloons.forEach((b, i) => {
        const u = b.userData;
        b.position.y = u.baseY + Math.sin(t * u.drift + u.phase) * 0.28;
        b.position.x = u.baseX + Math.cos(t * 0.35 + i) * 0.12;
        b.rotation.z = Math.sin(t * 0.7 + i) * 0.06;
        b.rotation.y = Math.cos(t * 0.6 + i) * 0.08;
      });

      hearts.forEach((h, i) => {
        const u = h.userData;
        h.position.y = u.baseY + Math.sin(t * u.speed + u.phase) * 0.18;
        h.position.x = u.baseX + Math.cos(t * u.speed * 0.8 + u.phase) * 0.08;
        h.rotation.z += 0.004;
        h.rotation.y = Math.sin(t * 0.6 + i) * 0.3;
      });

      stars.forEach((s, i) => {
        const u = s.userData;
        s.position.y = u.baseY + Math.sin(t * u.speed + u.phase) * 0.12;
        s.material.opacity = 0.25 + (Math.sin(t * 2 + i) * 0.5 + 0.5) * 0.65;
      });

      renderer.render(scene, camera);
    }

    animateScene();

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      camera.position.z = window.innerWidth < 640 ? 13 : 12;
    }
    resize();
    window.addEventListener("resize", resize);

    const bubbleWords = ["Honesty", "Trust", "Peace", "Care", "Us", "Real", "Warmth"];
    const bubbles = [];

    function createMemoryBubbles() {
      bubbleWords.forEach((word) => {
        const el = document.createElement("div");
        el.className = "float-bubble";
        el.dataset.word = word;
        el.innerHTML = "✦";
        document.body.appendChild(el);

        const bubble = {
          el,
          x: Math.random() * (window.innerWidth - 70) + 10,
          y: Math.random() * (window.innerHeight - 120) + 60,
          dx: (Math.random() - 0.5) * 0.35,
          dy: (Math.random() - 0.5) * 0.35,
          phase: Math.random() * Math.PI * 2
        };

        el.addEventListener("click", (e) => {
          showBubbleWord(word, e.clientX || bubble.x, e.clientY || bubble.y);
        });

        bubbles.push(bubble);
      });
    }

    function showBubbleWord(word, x, y) {
      bubbleWord.textContent = word;
      bubbleWord.style.left = `${x - 20}px`;
      bubbleWord.style.top = `${y - 46}px`;
      gsap.killTweensOf(bubbleWord);
      gsap.set(bubbleWord, { opacity: 1, y: 0 });
      gsap.fromTo(
        bubbleWord,
        { opacity: 0, y: 8, scale: 0.95 },
        {
          opacity: 1,
          y: 0,
          scale: 1,
          duration: 0.35,
          ease: "power2.out",
          onComplete: () => {
            gsap.to(bubbleWord, {
              opacity: 0,
              y: -12,
              delay: 1.1,
              duration: 0.45
            });
          }
        }
      );
    }

    function animateBubbles() {
      bubbles.forEach((b) => {
        b.x += b.dx + Math.sin(Date.now() * 0.001 + b.phase) * 0.08;
        b.y += b.dy + Math.cos(Date.now() * 0.0012 + b.phase) * 0.08;

        if (b.x < 8 || b.x > window.innerWidth - 60) b.dx *= -1;
        if (b.y < 56 || b.y > window.innerHeight - 60) b.dy *= -1;

        b.el.style.transform = `translate3d(${b.x}px, ${b.y}px, 0)`;
      });
      requestAnimationFrame(animateBubbles);
    }

    createMemoryBubbles();
    animateBubbles();

    musicToggle.addEventListener("click", async () => {
      try {
        if (bgMusic.paused) {
          await bgMusic.play();
          musicToggle.classList.add("playing");
        } else {
          bgMusic.pause();
          musicToggle.classList.remove("playing");
        }
      } catch (e) {
        console.log("Music autoplay blocked until user interaction.");
      }
    });

    function createConfettiBurst() {
      const colors = ["#ff8ec3", "#ffd86b", "#ffffff", "#ffbedd", "#ead1ff"];
      for (let i = 0; i < 120; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = `${window.innerWidth / 2}px`;
        c.style.top = `${window.innerHeight / 2}px`;
        c.style.background = colors[i % colors.length];
        c.style.width = `${8 + Math.random() * 8}px`;
        c.style.height = `${12 + Math.random() * 12}px`;
        confettiLayer.appendChild(c);

        const angle = Math.random() * Math.PI * 2;
        const distance = 120 + Math.random() * 260;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance - 100;
        const rot = (Math.random() - 0.5) * 720;

        gsap.fromTo(
          c,
          { x: 0, y: 0, rotate: 0, opacity: 1, scale: 1 },
          {
            x,
            y: y + 280,
            rotate: rot,
            opacity: 0,
            scale: 0.8,
            duration: 2.2 + Math.random() * 1.2,
            ease: "power2.out",
            onComplete: () => c.remove()
          }
        );
      }
    }

    function typeParagraph(el, text, speed = 22) {
      return new Promise((resolve) => {
        let i = 0;
        el.classList.add("visible", "typewriter-cursor");
        const timer = setInterval(() => {
          el.textContent = text.slice(0, i);
          i++;
          if (i > text.length) {
            clearInterval(timer);
            el.classList.remove("typewriter-cursor");
            resolve();
          }
        }, speed);
      });
    }

    function buildParagraphs() {
      paragraphsWrap.innerHTML = "";
      messageParagraphs.forEach((p, index) => {
        const el = document.createElement("p");
        el.className = "letter-paragraph";
        if (index === messageParagraphs.length - 1) {
          el.classList.add("last-paragraph");
        }
        el.dataset.index = index;
        paragraphsWrap.appendChild(el);
      });
    }

    buildParagraphs();

    async function revealFirstParagraph() {
      const first = document.querySelector('.letter-paragraph[data-index="0"]');
      await typeParagraph(first, messageParagraphs[0], 22);
    }

    function setupScrollReveal() {
      const els = [...document.querySelectorAll(".letter-paragraph")];
      const observer = new IntersectionObserver(
        async (entries) => {
          for (const entry of entries) {
            if (entry.isIntersecting) {
              const el = entry.target;
              const index = Number(el.dataset.index);
              if (el.dataset.done === "true") continue;
              el.dataset.done = "true";

              if (index === 0 && el.textContent.trim()) {
                el.classList.add("visible");
              } else {
                await new Promise(r => setTimeout(r, 200));
                await typeParagraph(el, messageParagraphs[index], 18);
              }

              observer.unobserve(el);
            }
          }
        },
        { threshold: 0.24 }
      );

      els.slice(1).forEach(el => observer.observe(el));
    }

    function openGift() {
      if (opened) return;
      opened = true;
      document.body.classList.add("revealed");

      if (navigator.vibrate) {
        navigator.vibrate([80, 40, 120]);
      }

      try {
        bgMusic.play();
        musicToggle.classList.add("playing");
      } catch (e) {}

      createConfettiBurst();

      gsap.to(balloonGroup.rotation, {
        z: 0.12,
        duration: 0.3,
        yoyo: true,
        repeat: 1,
        ease: "power2.inOut"
      });
      gsap.to(balloonGroup.position, {
        y: 0.5,
        duration: 0.4,
        yoyo: true,
        repeat: 1,
        ease: "power2.out"
      });

      const tl = gsap.timeline();

      tl.to(giftBox, {
        x: -4,
        y: 0,
        rotateZ: -2,
        duration: 0.08,
        repeat: 5,
        yoyo: true,
        ease: "power1.inOut"
      })
      .to(giftBox, {
        scale: 1.05,
        duration: 0.18,
        ease: "back.out(2)"
      })
      .to(boxLid, {
        y: -90,
        x: 50,
        rotation: 26,
        duration: 0.75,
        ease: "power3.out"
      }, "-=0.05")
      .to(".gift-label", {
        opacity: 0,
        y: -10,
        duration: 0.3
      }, "<")
      .to(scrollShell, {
        opacity: 1,
        y: 0,
        scale: 1,
        duration: 0.9,
        ease: "power3.out"
      }, "-=0.2")
      .to(letterSection, {
        opacity: 1,
        y: 0,
        pointerEvents: "auto",
        duration: 1.2,
        ease: "power2.out"
      }, "-=0.2")
      .add(() => {
        setTimeout(() => {
          letterSection.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 200);
      })
      .add(async () => {
        await revealFirstParagraph();
        setupScrollReveal();
      });

      gsap.to(".hero-panel", {
        opacity: 0.45,
        scale: 0.96,
        duration: 1.2,
        ease: "power2.out"
      });
    }

    giftBox.addEventListener("click", openGift);
    giftBox.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openGift();
      }
    });

    gsap.to(giftBox, {
      rotateZ: 1.2,
      y: -6,
      duration: 1.4,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    });
  </script>
</body>
</html>
