<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>

    <!-- Disable preview -->
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="none">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e9d5ff, #c4b5fd);
            color: #4b0082;
            text-align: center;
        }

        .container {
            margin-top: 80px;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #ff4e73;
            cursor: pointer;
            margin-top: 20px;
        }

        .hidden {
            display: none;
            margin-top: 30px;
        }

        .message {
            max-width: 600px;
            margin: auto;
            text-align: left;
            line-height: 1.7;
            font-size: 18px;
            white-space: pre-line;
        }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            background: white;
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        /* Image fade-in */
        img {
            width: 260px;
            border-radius: 15px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        img.show {
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday Neha 🎈💕</h1>

    <button onclick="showSurprise()">Click me 💌</button>

    <div id="surprise" class="hidden">
        <div id="message" class="message"></div>
        <span id="cursor" class="cursor"></span>
        <br>
        <img id="loveImg" src="photo.jpg" alt="hehe">
    </div>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const text = `Happy Birthday Neha ❤️ 🫶

I don’t know exactly when it started becoming this meaningful… but somewhere between all our conversations, your thoughts, your honesty, and the way you let me see the real you, you became very important to me.

What I feel for you was never something random or temporary. It came from the connection I felt with you — the way we talk, the emotional intelligence you carry, and the genuineness you show in the smallest things.

That is what made me admire you.
That is what made me feel close to you.
And that is what made me love you.

When I told you that I don’t mind not being your first, and that I just want to be the one who stays till the end, I meant it in every way.

And when you told me that you feel something real between us, that you trust me, that you value what we have, and that you want us to last… that stayed with me deeply.

Because what we have does feel real.
Not rushed, not forced, not temporary.
Just something calm, honest, and meaningful — something that slowly grows with trust, care, and understanding.

I know both of us feel the value of this bond.
And maybe that’s what makes it so special.

So on your birthday, more than anything else, I just want you to feel happy, peaceful, and loved.
No pressure, no overthinking — just a beautiful day for the beautiful person you are 🌝

Thank you for being you.
Thank you for trusting me.
And thank you for letting this bond become something so special to me.

I’ll be here — not just for today, but for all the little moments, the difficult days, the laughter, the silence, and everything in between. 🙂

Have the most beautiful birthday, Nehoos❤️`;

let i = 0;

function showSurprise() {
    document.getElementById("surprise").style.display = "block";
    document.getElementById("bgMusic").play();
    typeWriter();
}

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 25);
    } else {
        // hide cursor after typing finishes
        document.getElementById("cursor").style.display = "none";

        // show image after slight delay
        setTimeout(() => {
            document.getElementById("loveImg").classList.add("show");
        }, 500);
    }
}
</script>

</body>
</html>
