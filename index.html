<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>

    <!-- Disable preview -->
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="none">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #ff4e73;
            cursor: pointer;
            margin-top: 20px;
        }

        .hidden {
            display: none;
            margin-top: 30px;
        }

        .message {
            max-width: 600px;
            margin: auto;
            text-align: left;
            line-height: 1.7;
            font-size: 18px;
            white-space: pre-line;
        }

        /* Blinking cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            background: white;
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }

        /* Image fade-in */
        img {
            width: 260px;
            border-radius: 15px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        img.show {
            opacity: 1;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday Neha 🎈💕</h1>

    <button onclick="showSurprise()">Click > 💌</button>

    <div id="surprise" class="hidden">
        <div id="message" class="message"></div>
        <span id="cursor" class="cursor"></span>
        <br>
        <img id="loveImg" src="photo.jpg" alt="Our Memory">
    </div>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const text = `Happy Birthday Neha  🫶

I don’t know how things became like this… but somewhere between all our random chats, late-night talks, and everything you shared, you became really important to me.

I’ve seen you at your low phases, when you were confused, stressed… and still, you’ve been so strong in your own way. And honestly, I admire that about you a lot.

Being with you — even like this — feels easy. I like talking to you, making you smile, and just being there for you.

I want something real… something calm, something that grows slowly, with trust and understanding.

And I feel like we’re already building that, in our own way.

So today, I just want you to be happy… no overthinking, no stress. Just enjoy your day.

And yeah… I’ll be here, as always 🙂

Have a beautiful birthday ❤️`;

let i = 0;

function showSurprise() {
    document.getElementById("surprise").style.display = "block";
    document.getElementById("bgMusic").play();
    typeWriter();
}

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 20);
    } else {
        // hide cursor after typing finishes
        document.getElementById("cursor").style.display = "none";

        // show image after slight delay
        setTimeout(() => {
            document.getElementById("loveImg").classList.add("show");
        }, 500);
    }
}
</script>

</body>
</html>
